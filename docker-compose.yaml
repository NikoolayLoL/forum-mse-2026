services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    ports:
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      FORUM_CORS_ALLOWED_ORIGINS: http://forum:3000,http://localhost:3000
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://forum:9000
    environment:
      # Make Next's standalone banner show "http://forum:3000".
      # forum -> 0.0.0.0 (via extra_hosts) so the server still binds all
      # interfaces and stays reachable through the published port.
      HOSTNAME: forum
    extra_hosts:
      - "forum:0.0.0.0"
    ports:
      - "3000:3000"
    depends_on:
      - app
